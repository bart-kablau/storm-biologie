<svg xmlns="http://www.w3.org/2000/svg" width="420" height="540" viewBox="0 0 420 540" role="img" aria-label="Lengtedoorsnede van een bloem">
  <defs>
    <linearGradient id="petal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E9A8D6"/><stop offset="1" stop-color="#C865AE"/>
    </linearGradient>
    <linearGradient id="sepal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7CC36A"/><stop offset="1" stop-color="#4E9A45"/>
    </linearGradient>
    <linearGradient id="anther" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBD24B"/><stop offset="1" stop-color="#E9A12C"/>
    </linearGradient>
    <linearGradient id="ovary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#CFE8B8"/><stop offset="1" stop-color="#A9D687"/>
    </linearGradient>
  </defs>

  <!-- bloemsteel -->
  <path d="M205 430 q5 55 5 100" fill="none" stroke="#4E9A45" stroke-width="13" stroke-linecap="round"/>
  <!-- bloembodem (receptacle) -->
  <ellipse cx="210" cy="430" rx="46" ry="20" fill="#8FBF6E"/>

  <!-- kroonbladen (groot, gekleurd) -->
  <path d="M210 415 C 70 405, 18 250, 58 120 C 110 210, 175 300, 210 360 Z" fill="url(#petal)" stroke="#A84C90" stroke-width="2"/>
  <path d="M210 415 C 350 405, 402 250, 362 120 C 310 210, 245 300, 210 360 Z" fill="url(#petal)" stroke="#A84C90" stroke-width="2"/>

  <!-- kelkbladen (groen, klein, aan de basis) -->
  <path d="M210 420 C 150 420, 120 452, 120 480 C 165 470, 198 448, 210 420 Z" fill="url(#sepal)" stroke="#3F7E38" stroke-width="2"/>
  <path d="M210 420 C 270 420, 300 452, 300 480 C 255 470, 222 448, 210 420 Z" fill="url(#sepal)" stroke="#3F7E38" stroke-width="2"/>

  <!-- meeldraden: helmdraad (filament) + helmknop (anther) -->
  <path d="M188 415 C 150 330, 120 240, 118 168" fill="none" stroke="#D8B23A" stroke-width="6" stroke-linecap="round"/>
  <ellipse cx="116" cy="152" rx="18" ry="26" fill="url(#anther)" stroke="#C98A1F" stroke-width="2" transform="rotate(-14 116 152)"/>
  <path d="M232 415 C 270 330, 300 240, 302 168" fill="none" stroke="#D8B23A" stroke-width="6" stroke-linecap="round"/>
  <ellipse cx="304" cy="152" rx="18" ry="26" fill="url(#anther)" stroke="#C98A1F" stroke-width="2" transform="rotate(14 304 152)"/>

  <!-- stamper: vruchtbeginsel + stijl + stempel -->
  <!-- vruchtbeginsel (bulb) -->
  <path d="M210 300 C 168 300, 158 350, 162 388 C 166 420, 254 420, 258 388 C 262 350, 252 300, 210 300 Z" fill="url(#ovary)" stroke="#6FA84F" stroke-width="2.5"/>
  <!-- zaadbeginsels met eicel erin -->
  <ellipse cx="190" cy="362" rx="13" ry="17" fill="#F2F8EA" stroke="#6FA84F" stroke-width="2"/>
  <circle cx="190" cy="362" r="5" fill="#E9A12C"/>
  <ellipse cx="230" cy="362" rx="13" ry="17" fill="#F2F8EA" stroke="#6FA84F" stroke-width="2"/>
  <circle cx="230" cy="362" r="5" fill="#E9A12C"/>
  <!-- stijl -->
  <path d="M210 300 L 210 175" fill="none" stroke="#8AB76A" stroke-width="11" stroke-linecap="round"/>
  <!-- stempel (knobje bovenaan) -->
  <path d="M210 168 C 188 150, 188 132, 210 128 C 232 132, 232 150, 210 168 Z" fill="#7FB95F" stroke="#5B954A" stroke-width="2"/>
  <circle cx="210" cy="142" r="12" fill="#9AD179"/>
</svg>
